       </section> 
        
       <form action="" method="post">
            <label for="name">Nom :</label>
            <input type="text" id="name" name="name" required placeholder="Israel" required>

            <input type="email" id="email" name="email" required placeholder="israel@example.com"required>
            
            <label for="message">Message :</label>
            <textarea id="message" name="message" required placeholder="Votre message ici..." required ></textarea>
            
            <button type="submit">Envoyer</button>
        </form>
